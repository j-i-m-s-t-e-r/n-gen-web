<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n_Gen — web port</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<!--
  n_Gen's original text sprites drew from a library of ~244 embedded
  display fonts, split into a different cluster per module (gothic for
  calnoir, digital/LCD for spcfrm, playful for ftool, clean grotesk for
  the rest) — a genuinely nice piece of the original design. Those are
  named commercial typefaces from real foundries though, not
  redistributable in a public repo. This pulls same-spirit pools of free,
  OFL-licensed fonts instead, one pool per module — see js/fontpool.js.
-->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=UnifrakturCook&family=Metal+Mania&family=Nosifer&family=IM+Fell+English&family=Special+Elite&family=Orbitron:wght@400;700&family=Audiowide&family=Share+Tech+Mono&family=VT323&family=Rajdhani:wght@400;600&family=Chakra+Petch:wght@400;600&family=Baloo+2:wght@400;700&family=Fredoka:wght@400;600&family=Bungee&family=Luckiest+Guy&family=Chewy&family=Oswald:wght@400;600&family=Big+Shoulders+Display:wght@400;700&family=Archivo+Black&family=Anton&family=Bebas+Neue&family=Teko:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<!-- Real extracted fonts, private use only — see assets/fonts-private/README
     and .gitignore. Harmless 404 if this folder isn't present (e.g. a
     fresh clone without it); randomFont() falls back to Google Fonts. -->
<link rel="stylesheet" href="assets/fonts-private/fonts.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-title">
        <span class="mono dim">n_Gen</span><span class="mono accent">.web</span>
      </div>
      <div class="topbar-sub mono dim">2001 Director source, decompiled & re-hosted — see README</div>
    </header>

    <div class="layout">
      <aside class="panel">
        <label class="field-label mono">module</label>
        <select id="module-select" class="mono"></select>

        <label class="field-label mono">format</label>
        <select id="format-select" class="mono">
          <option value="page">Poster</option>
          <option value="bcard">Business Card</option>
          <option value="pcard">Flyer</option>
          <option value="cd">CD Jacket</option>
          <option value="record">Record Label</option>
          <option value="web">Web Page</option>
        </select>

        <label class="field-label mono">headline</label>
        <input id="txt1" class="mono" type="text" value="n_Gen">

        <label class="field-label mono">subhead</label>
        <input id="txt2" class="mono" type="text" value="Design Machine">

        <label class="field-label mono">body copy</label>
        <textarea id="txt3" class="mono" rows="4">Press the n_GENERATE button to create a new composition.</textarea>

        <button id="generate-btn" class="generate-btn mono">Generate</button>
        <button id="download-btn" class="download-btn mono">Download PNG</button>

        <div class="panel-footer mono dim">
          n_Gen web port — see README for asset/font notes
        </div>
      </aside>

      <main class="stage-wrap">
        <div id="stage" class="stage"></div>
      </main>
    </div>
  </div>

  <script src="js/fontpool.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
